[pytest]
# pytest.ini — Playwright test configuration
#
# Features:
#   - Multi-browser testing: chromium, firefox, webkit
#   - Mobile device emulation: iPhone, iPad, Pixel, Samsung Galaxy
#   - DevTools/CDP for browser monitoring
#   - Allure report integration
#
# Generates HTML report at reports/e2e/playwright/report.html
# Pass --self-contained-html to embed all assets in a single file
#
# Run:
#   pytest tests/e2e/playwright/ -v
#   pytest tests/e2e/playwright/ --html=reports/e2e/playwright/report.html --self-contained-html
#
# Cross-browser:
#   PLAYWRIGHT_BROWSER=firefox pytest tests/e2e/playwright/ -v
#   pytest tests/e2e/playwright/ -v --browser=chromium --browser=firefox
#
# Mobile devices:
#   pytest tests/e2e/playwright/ -v -k "mobile"

addopts =
    -v
    --html=reports/e2e/playwright/report.html
    --self-contained-html
    --tb=short

testpaths = tests/e2e/playwright/specs

# Custom markers
markers =
    smoke: Site-level smoke tests — verify basic page load and element presence
    functional: Functional tests — verify chatbot and contact form behaviour
    cross-browser: Tests that run across multiple browsers
    mobile: Tests that run on mobile devices/emulators
    devtools: Tests that use Chrome DevTools Protocol (CDP)
    chrome: Run only on Chromium browser
    firefox: Run only on Firefox browser
    webkit: Run only on WebKit/Safari browser
    iphone: Run on iPhone device emulation
    ipad: Run on iPad device emulation
    android: Run on Android device emulation (Pixel, Samsung)

# Parametrize settings for indirect parameterization
filterwarnings =
    ignore::DeprecationWarning