# =============================================================================
# deploy-develop.yml — Staging CI/CD Deploy Pipeline
# =============================================================================
# Triggers on every push to the develop branch.
# Deploys to a separate staging environment (camiloavila-dev-staging stack).
#
# Pipeline stages:
#   1. backend-checks   — Python lint + unit tests (pytest) + Allure
#   2. frontend-checks  — ESLint + audit + build check
#   3. deploy-backend   — SAM build + deploy to staging stack
#   4. upload-kb        — Upload knowledge_base.md to staging S3 bucket
#   5. deploy-frontend  — Vite build + sync to S3 + CloudFront invalidation
#   6. smoke-tests      — Cypress + Puppeteer + Playwright against staging site
#   7. publish-reports  — Generate Allure report and publish to GitHub Pages
#
# Required GitHub Secrets:
#   AWS_ROLE_TO_ASSUME           — IAM role ARN with required policies
#   BEDROCK_MODEL_ID             — qwen.qwen3-coder-next
#   SES_SENDER_EMAIL             — camiloavilainfo@gmail.com
#   ACM_CERTIFICATE_ARN              — ACM cert ARN
#   STAGING_S3_FRONTEND_BUCKET   — Staging S3 bucket (populated after first staging deploy)
#   STAGING_CLOUDFRONT_DIST_ID  — Staging CloudFront distribution ID
#   STAGING_PLAYWRIGHT_BASE_URL  — https://staging.camiloavila.dev (or use custom domain)
# =============================================================================

name: Deploy Develop (Staging)

on:
  push:
    branches:
      - develop

permissions:
  id-token: write   # Required for OIDC role assumption
  contents: read
  pages: write      # Required for GitHub Pages

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Backend quality gate
  # ---------------------------------------------------------------------------
  backend-checks:
    name: Backend — Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python3 -m pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 backend/src/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          flake8 backend/src/ \
            --count \
            --exit-zero \
            --max-line-length=100 \
            --statistics

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Run Pytest unit tests with Allure
        run: |
          mkdir -p reports/unit
          python3 -m pytest backend/tests/unit/ \
            -v \
            --alluredir=reports/unit/allure-results \
            --clean-alluredir \
            --cov=backend/src \
            --cov-report=html:reports/unit/coverage \
            --cov-report=term-missing
        env:
          KNOWLEDGE_BUCKET: test-bucket
          KNOWLEDGE_KEY: knowledge_base.md
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}
          CONTACT_TABLE: test-contacts
          SES_SENDER_EMAIL: ${{ secrets.SES_SENDER_EMAIL }}
          ALLOWED_ORIGIN: https://staging.camiloavila.dev

      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports-${{ github.run_id }}
          path: reports/unit/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-unit-results-${{ github.run_id }}
          path: reports/unit/allure-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Stage 2: Frontend quality gate
  # ---------------------------------------------------------------------------
  frontend-checks:
    name: Frontend — Lint, Audit & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build frontend (pre-deploy check)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.execute-api.us-east-1.amazonaws.com/prod

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy backend to staging (SAM)
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Staging (SAM)
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    outputs:
      api_url: ${{ steps.get-outputs.outputs.api_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: SAM Build
        run: sam build --parallel

      - name: SAM Deploy to Staging
        run: sam deploy --stack-name camiloavila-dev-staging --no-confirm-changeset --no-fail-on-empty-changeset --parameter-overrides CertificateArn="${{ secrets.ACM_CERTIFICATE_ARN }}" BedrockModelId="${{ secrets.BEDROCK_MODEL_ID }}" SesSenderEmail="${{ secrets.SES_SENDER_EMAIL }}" DomainName=staging.camiloavila.dev

      - name: Get API Gateway URL from stack outputs
        id: get-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name camiloavila-dev-staging \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API URL: $API_URL"

  # ---------------------------------------------------------------------------
  # Stage 4: Upload knowledge base to staging S3
  # ---------------------------------------------------------------------------
  upload-kb:
    name: Upload Knowledge Base to Staging S3
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Upload knowledge_base.md to staging S3
        run: |
          KB_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name camiloavila-dev-staging \
            --query "Stacks[0].Outputs[?OutputKey=='KnowledgeBaseBucketName'].OutputValue" \
            --output text)
          aws s3 cp knowledge_base.md "s3://$KB_BUCKET/knowledge_base.md"
          echo "Uploaded knowledge_base.md to s3://$KB_BUCKET/"

  # ---------------------------------------------------------------------------
  # Stage 5: Build and deploy frontend to staging S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Staging (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend with staging API URL
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.api_url }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Sync dist/ to staging S3 frontend bucket
        run: |
          aws s3 sync frontend/dist/ \
            "s3://${{ secrets.STAGING_S3_FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          aws s3 sync frontend/dist/ \
            "s3://${{ secrets.STAGING_S3_FRONTEND_BUCKET }}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate staging CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_DIST_ID }} \
            --paths "/*"
          echo "Staging CloudFront cache invalidated."

  # ---------------------------------------------------------------------------
  # Stage 6: Smoke tests against staging site
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke Tests (Staging Site)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, upload-kb]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for CloudFront propagation
        run: sleep 30

      # --- Cypress smoke tests ---
      - name: Set up Node.js 20 (Cypress)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/package.json

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Configure Cypress Allure
        working-directory: tests
        run: npm run build && npx cypress-allure write

      - name: Run Cypress smoke tests
        working-directory: tests
        run: npm run test:cypress
        env:
          CYPRESS_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
        continue-on-error: true

      - name: Upload Cypress reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-smoke-reports-${{ github.run_id }}
          path: reports/e2e/cypress/
          retention-days: 30

      - name: Upload Cypress Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-cypress-results-${{ github.run_id }}
          path: tests/e2e/cypress/allure-results/
          retention-days: 30

      # --- Puppeteer smoke tests ---
      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome
        working-directory: tests

      - name: Run Puppeteer smoke tests
        working-directory: tests
        run: npm run test:puppeteer
        env:
          PUPPETEER_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
        continue-on-error: true

      - name: Upload Puppeteer reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: puppeteer-smoke-reports-${{ github.run_id }}
          path: reports/e2e/puppeteer/
          retention-days: 30

      - name: Upload Puppeteer Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-puppeteer-results-${{ github.run_id }}
          path: tests/e2e/puppeteer/allure-results/
          retention-days: 30

      # --- Playwright smoke tests ---
      - name: Set up Python 3.12 (Playwright)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright dependencies
        run: |
          python3 -m pip install playwright pytest pytest-html allure-pytest
          playwright install chromium

      - name: Run Playwright smoke + functional tests with Allure
        run: |
          mkdir -p reports/e2e/playwright
          python3 -m pytest tests/e2e/playwright/ \
            -v \
            -m "smoke or functional" \
            --alluredir=reports/e2e/playwright/allure-results \
            --clean-alluredir \
            --html=reports/e2e/playwright/report.html \
            --self-contained-html
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_PLAYWRIGHT_BASE_URL }}
        continue-on-error: true

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-reports-${{ github.run_id }}
          path: reports/e2e/playwright/
          retention-days: 30

      - name: Upload Playwright Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-playwright-results-${{ github.run_id }}
          path: reports/e2e/playwright/allure-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Stage 7: Publish Allure reports to GitHub Pages
  # ---------------------------------------------------------------------------
  publish-reports:
    name: Publish Allure Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: smoke-tests
    permissions:
      contents: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-*
          merge-multiple: true

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure report
        run: |
          allure generate allure-results/ -o allure-report --clean

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4