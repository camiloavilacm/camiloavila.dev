# =============================================================================
# security-tests.yml — Weekly Security Scan
# =============================================================================
# Runs weekly (Sunday 00:00 UTC) to perform automated security testing.
#
# This workflow runs security-focused tests against the codebase to detect:
#   - Prompt injection vulnerabilities (OWASP LLM01)
#   - Off-topic content blocking
#   - Input validation gaps
#   - Output handling issues (OWASP LLM05)
#
# Jobs:
#   security-tests    — Run security unit tests with Allure reports
#   lint-checks       — Run code quality checks
#   dependency-scan   — Check for vulnerable dependencies
#   publish-reports   — Publish Allure reports to GitHub Pages (main + develop)
#
# GitHub Pages:
#   Security reports available at:
#   - Production: camiloavila.dev/test-reports/security/
#   - Staging: camiloavila-dev-staging.test-reports.security/
#
# Note: E2E security tests (real API tests) are SKIPPED by default.
#       They only run when manually triggered with ENV=production.
# =============================================================================

name: Weekly Security Tests

on:
  schedule:
    - cron: '0 0 * * 0'  # Sunday 00:00 UTC
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read
  pull-requests: write
  pages: write

jobs:
  # ---------------------------------------------------------------------------
  # Security Unit Tests with Allure
  # ---------------------------------------------------------------------------
  security-tests:
    name: Security — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pip install pytest allure-pytest

      - name: Run security unit tests with Allure
        working-directory: backend
        run: |
          source venv/bin/activate
          export AWS_DEFAULT_REGION=us-east-1
          mkdir -p reports/security/allure-results
          pytest tests/unit/test_security.py -v \
            --tb=short \
            --alluredir=reports/security/allure-results

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: reports/security/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Code Quality Checks
  # ---------------------------------------------------------------------------
  lint-checks:
    name: Security — Lint Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install flake8

      - name: Run flake8
        working-directory: backend
        run: |
          source venv/bin/activate
          flake8 src/ --max-line-length=100 --ignore=E501,W503

      - name: Check for exposed secrets
        run: |
          # Basic secret detection
          grep -r "password\|secret\|key" --include="*.py" . || true
          # Check for hardcoded credentials
          grep -r "AKIA\|aws_access_key" --include="*.py" . || true

  # ---------------------------------------------------------------------------
  # Dependency Security Scan
  # ---------------------------------------------------------------------------
  dependency-scan:
    name: Security — Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for known vulnerabilities
        run: |
          pip install safety
          cd backend
          safety check || true

      - name: Check frontend dependencies
        working-directory: frontend
        run: |
          npm audit --audit-level=moderate || true

  # ---------------------------------------------------------------------------
  # Publish Allure Reports to GitHub Pages
  # ---------------------------------------------------------------------------
  publish-reports:
    name: Security — Publish Allure Reports
    needs: [security-tests, lint-checks, dependency-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Download security test results
        uses: actions/download-artifact@v4
        with:
          name: security-test-results
          path: allure-results

      - name: Generate Allure report
        run: |
          allure generate allure-results/ -o security-report --clean

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-allure-report
          path: security-report/

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: security-report/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

  # ---------------------------------------------------------------------------
  # Generate Security Report Summary
  # ---------------------------------------------------------------------------
  security-report:
    name: Security — Summary Report
    runs-on: ubuntu-latest
    needs: [security-tests, lint-checks, dependency-scan]

    steps:
      - name: Generate summary
        run: |
          echo "## Weekly Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint checks: ${{ needs.lint-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review any test failures" >> $GITHUB_STEP_SUMMARY
          echo "2. Check dependency vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "3. Run E2E tests manually against production if needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Reports" >> $GITHUB_STEP_SUMMARY
          echo "Allure test reports are published to GitHub Pages:" >> $GITHUB_STEP_SUMMARY
          echo "- Main branch: /test-reports/security/" >> $GITHUB_STEP_SUMMARY
          echo "- Develop branch: /test-reports/security/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To run E2E tests against production:" >> $GITHUB_STEP_SUMMARY
          echo "```bash" >> $GITHUB_STEP_SUMMARY
          echo "ENV=production pytest tests/e2e/playwright/specs/test_security.py -v" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "⚠️ Weekly Security Scan Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Weekly Security Scan Failed*\n\nTests: ${{ needs.security-tests.result }}\nLints: ${{ needs.lint-checks.result }}\nDeps: ${{ needs.dependency-scan.result }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: WEBHOOK_URL